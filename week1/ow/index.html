<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오버워치 전략 가이드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>🎯 OW-MAP MASTER</h1>
        <p>맵과 역할군을 고르면 승리 전략이 보입니다.</p>
    </header>

    <div class="container">
        <!-- Step 1: 맵 선택 -->
        <section class="step-section" id="step1">
            <h2>Step 1. 맵 선택</h2>
            <div id="mapGrid"></div>
        </section>

        <!-- Step 2: 역할군 선택 -->
        <section class="step-section disabled" id="step2">
            <h2>Step 2. 역할군 선택</h2>
            <div class="role-buttons">
                <button class="role-btn" data-role="tank">🛡️ 돌격 (Tank)</button>
                <button class="role-btn" data-role="damage">⚔️ 공격 (Damage)</button>
                <button class="role-btn" data-role="support">💉 지원 (Support)</button>
            </div>
        </section>

        <!-- 결과창 -->
        <section id="resultBox" class="hidden">
            <h2 id="resultTitle" class="result-title">맵 이름 - 역할군 전략</h2>
            
            <div class="card strategy-card">
                <h3>🗺️ 거점별 핵심 전략</h3>
                <ul id="strategyList"></ul>
            </div>

            <div id="roleDataContent" class="role-content-grid">
                <!-- JS에서 추천 영웅, 시너지, 카운터 내용이 렌더링됩니다 -->
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
